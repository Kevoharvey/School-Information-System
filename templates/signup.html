<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRC School Information System - Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="login-card">
            <div class="brand-header">
                <h2>NRC School Information System</h2>
            </div>

            <form id="signup-form">
                <p id="signup-message" class="form-message" role="alert"></p>
                
                <div class="role-selection">
                    <label>Select Your Role:</label>
                    <div class="role-buttons">
                        <button type="button" class="role-btn active" data-role="student">Student</button>
                        <button type="button" class="role-btn" data-role="teacher">Teacher</button>
                        <button type="button" class="role-btn" data-role="admin">Admin</button>
                    </div>
                    <input type="hidden" id="role" name="role" value="student">
                </div>

                <div class="input-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>

                <div class="input-group" id="school-id-group">
                    <label for="school_id" id="school-id-label">Student ID</label>
                    <input type="number" id="school_id" name="school_id" placeholder="Enter your student ID" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a secure password" minlength="6" required>
                </div>

                <input type="submit" value="Create Account" class="login-btn">
            </form>

            <div class="login-link">
                <h3>Already have an account?</h3>
                <a href="index.html" class="register-btn">Login Here</a>
            </div>
        </div>
    </div>
    <script>
        const buttons = document.querySelectorAll(".role-btn");
        const roleInput = document.getElementById("role");
        const schoolIdGroup = document.getElementById("school-id-group");
        const schoolIdLabel = document.getElementById("school-id-label");
        const schoolIdInput = document.getElementById("school_id");
        const signupForm = document.getElementById("signup-form");
        const signupMessage = document.getElementById("signup-message");

        const dashboardPages = {
            student: "student-dashboard.html",
            teacher: "teacher-dashboard.html",
            admin: "admin-dashboard.html"
        };

        function showMessage(message, type = "error") {
            signupMessage.textContent = message;
            signupMessage.className = `form-message ${type}`;
        }

        function selectRole(role) {
            roleInput.value = role;

            buttons.forEach(button => {
                button.classList.toggle("active", button.dataset.role === role);
            });

            if (role === "admin") {
                schoolIdGroup.hidden = true;
                schoolIdInput.required = false;
                schoolIdInput.value = "";
                return;
            }

            schoolIdGroup.hidden = false;
            schoolIdInput.required = true;
            schoolIdLabel.textContent = role === "teacher" ? "Teacher ID" : "Student ID";
            schoolIdInput.placeholder = role === "teacher" ? "Enter your teacher ID" : "Enter your student ID";
        }

        buttons.forEach(button => {
            button.addEventListener("click", () => selectRole(button.dataset.role));
        });

        signupForm.addEventListener("submit", async event => {
            event.preventDefault();

            showMessage("");
            const submitButton = signupForm.querySelector(".login-btn");
            submitButton.disabled = true;
            submitButton.value = "Creating...";

            try {
                const response = await fetch("/api/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        role: roleInput.value,
                        name: document.getElementById("full_name").value,
                        email: document.getElementById("email").value,
                        id: schoolIdInput.value,
                        password: document.getElementById("password").value
                    })
                });
                const result = await response.json();

                if (!response.ok || !result.ok) {
                    showMessage(result.error || "Account creation failed. Please try again.");
                    return;
                }

                showMessage("Account created. Redirecting...", "success");
                window.location.href = dashboardPages[result.user.role];
            } catch (error) {
                showMessage("Could not connect to the server. Make sure Flask is running.");
            } finally {
                submitButton.disabled = false;
                submitButton.value = "Create Account";
            }
        });

        selectRole("student");
    </script>
</body>
</html>
