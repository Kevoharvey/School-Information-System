{% extends "base.html" %}

{% block content %}
<h2>Students</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Level</th>
        <th>Email</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.Student_ID }}</td>
        <td>{{ student.Fname }}</td>
        <td>{{ student.Lname }}</td>
        <td>{{ student.Level }}</td>
        <td>{{ student.Student_Email }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
