<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-page">
        <div class="dashboard-header">
            <div>
                <p class="dashboard-kicker">NRC School Information System</p>
                <h1>Student Dashboard</h1>
            </div>
            <a href="index.html" class="logout-link">Logout</a>
        </div>

        <div class="dashboard-grid">
            <section class="dashboard-card">
                <h2>My Courses</h2>
                <p>View your enrolled courses and class details.</p>
            </section>
            <section class="dashboard-card">
                <h2>Grades</h2>
                <p>Check your latest grades and academic progress.</p>
            </section>
            <section class="dashboard-card">
                <h2>Schedule</h2>
                <p>See upcoming classes, exams, and university events.</p>
            </section>
        </div>
    </div>
</body>
</html>
