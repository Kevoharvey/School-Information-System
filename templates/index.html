<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Information System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h2>Welcome to NRC's Information System, where you can access information about students, teachers, and courses.</h2>
    </div>
    <div class="page-wrapper">
        <div class="login-card">
            <h3>Please login to continue</h3>
            <br><br><br><br>

            <form id="login-form">
                <p id="login-message" class="form-message" role="alert"></p>

                <div class="role-selection">
                    <label>Login As:</label>
                    <div class="role-buttons">
                        <button type="button" class="role-btn active" data-role="student">Student</button>
                        <button type="button" class="role-btn" data-role="teacher">Teacher</button>
                        <button type="button" class="role-btn" data-role="admin">Admin</button>
                    </div>
                    <input type="hidden" id="role" name="role" value="student">
                </div>

                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <input type="submit" value="Login" class="login-btn">
            </form>
            <h3>Not registered?</h3>
            <a href="signup.html" class="register-btn">Register Here</a>
        </div>
    </div>

    <script>
        const dashboardPages = {
            student: "student-dashboard.html",
            teacher: "teacher-dashboard.html",
            admin: "admin-dashboard.html"
        };

        const roleButtons = document.querySelectorAll(".role-btn");
        const roleInput = document.getElementById("role");
        const savedRole = localStorage.getItem("selectedRole") || "student";

        function selectRole(role) {
            roleInput.value = role;
            localStorage.setItem("selectedRole", role);

            roleButtons.forEach(button => {
                button.classList.toggle("active", button.dataset.role === role);
            });
        }

        roleButtons.forEach(button => {
            button.addEventListener("click", () => selectRole(button.dataset.role));
        });

        const loginForm = document.getElementById("login-form");
        const loginMessage = document.getElementById("login-message");

        function showMessage(message, type = "error") {
            loginMessage.textContent = message;
            loginMessage.className = `form-message ${type}`;
        }

        loginForm.addEventListener("submit", async event => {
            event.preventDefault();

            showMessage("");
            const submitButton = loginForm.querySelector(".login-btn");
            submitButton.disabled = true;
            submitButton.value = "Logging in...";

            try {
                const response = await fetch("/api/signin", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        role: roleInput.value,
                        email: document.getElementById("email").value,
                        password: document.getElementById("password").value
                    })
                });
                const result = await response.json();

                if (!response.ok || !result.ok) {
                    showMessage(result.error || "Login failed. Please try again.");
                    return;
                }

                showMessage("Login successful. Redirecting...", "success");
                window.location.href = dashboardPages[result.user.role];
            } catch (error) {
                showMessage("Could not connect to the server. Make sure Flask is running.");
            } finally {
                submitButton.disabled = false;
                submitButton.value = "Login";
            }
        });

        selectRole(savedRole);
    </script>
</body>
</html>
